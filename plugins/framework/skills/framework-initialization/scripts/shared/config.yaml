# Framework Settings Configuration

settings:
  geolocation:
    service: https://ipinfo.io/json
  path:
    configuration: .claude
    documentation:
      conversation: data/conversations
      diary: data/diary
    instructions:
      common: instructions/common
      domain: instructions
    package:
      excludes:
        - scripts/memory/instructions
        - scripts/memory/profiles
      output: data/packages
    profiles:
      common: profiles/common
      domain: profiles
    project:
      container: /mnt/project
      local: projects
    skill:
      container: /mnt/skills/user
      local: plugins/cache/axivo
    transcripts:
      container: /mnt/transcripts
  profile: DEVELOPER
  reflections:
    cdn: https://cdn.axivo.com
    limit: 50
    repository:
      name: claude-reflections
      organization: axivo
    url: https://axivo.com/claude/reflections
  search:
    limit: 10
    service:
      appId: Q87QW4FRL5
      apiKey: 94d5f62b378913a136bf09e67182dfc6
      indexName: axivo.com
    snippet:
      words: 100
  relations:
    - extends
    - inherits
    - overrides
  plugins:
    analysis:
      - plugin:
          name: code-review
          version: 1.0.0
        skills:
          review: code-review
    collaboration:
      - plugin:
          name: brainstorming
          version: 1.0.0
        skills:
          brainstorm: brainstorming
      - plugin:
          name: conversation-log
          version: 1.0.0
        skills:
          log: conversation-log
    framework:
      - plugin:
          name: framework
          version: 1.2.1
        skills:
          init: framework-initialization
          methodology: framework-methodology
  session:
    storage: 10
  version: 1.0.0
